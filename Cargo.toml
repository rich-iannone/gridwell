[workspace]
members = [
    "crates/gridwell-ir",
    "crates/gridwell-core",
    "crates/gridwell-writer-html",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/rich-iannone/gridwell"
rust-version = "1.75"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
insta = "1"
